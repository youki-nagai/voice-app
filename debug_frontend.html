<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSE Debug</title>
    <style>
        body {
            font-family: monospace;
            background: #000;
            color: #0f0;
            padding: 20px;
        }
        .log {
            margin: 5px 0;
            padding: 5px;
            border-left: 3px solid #333;
        }
        .error { color: #f00; border-left-color: #f00; }
        .success { color: #0f0; border-left-color: #0f0; }
        .info { color: #ff0; border-left-color: #ff0; }
        .debug { color: #ccc; border-left-color: #666; }
        button {
            background: #333;
            color: #fff;
            border: 1px solid #666;
            padding: 10px 20px;
            cursor: pointer;
            margin: 10px 0;
        }
        button:hover { background: #555; }
        #logs {
            height: 400px;
            overflow-y: scroll;
            border: 1px solid #333;
            padding: 10px;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <h1>SSE Debug Tool</h1>
    <button onclick="testSSE()">SSE テスト実行</button>
    <button onclick="clearLogs()">ログクリア</button>
    
    <div id="logs"></div>
    
    <script>
        const logsDiv = document.getElementById('logs');
        
        function log(message, type = 'debug') {
            const div = document.createElement('div');
            div.className = `log ${type}`;
            div.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logsDiv.appendChild(div);
            logsDiv.scrollTop = logsDiv.scrollHeight;
        }
        
        function clearLogs() {
            logsDiv.innerHTML = '';
        }
        
        async function testSSE() {
            log('SSE テスト開始', 'info');
            
            try {
                const response = await fetch('/api/voice/stream', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'text/event-stream'
                    },
                    body: JSON.stringify({ text: 'デバッグテスト' })
                });
                
                log(`HTTP Status: ${response.status}`, 'info');
                log(`Content-Type: ${response.headers.get('content-type')}`, 'debug');
                
                if (!response.ok) {
                    log(`HTTP Error: ${response.status} ${response.statusText}`, 'error');
                    const errorText = await response.text();
                    log(`Error Body: ${errorText}`, 'error');
                    return;
                }
                
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let eventCount = 0;
                
                while (true) {
                    const { done, value } = await reader.read();
                    
                    if (done) {
                        log('ストリーム終了', 'info');
                        break;
                    }
                    
                    const chunk = decoder.decode(value);
                    log(`Raw Chunk: ${JSON.stringify(chunk)}`, 'debug');
                    
                    const lines = chunk.split('\n');
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.slice(6));
                                eventCount++;
                                log(`Event #${eventCount}: ${data.type} - ${JSON.stringify(data)}`, 'success');
                                
                                if (data.type === 'complete') {
                                    log('✅ 完了イベント受信', 'success');
                                    return;
                                }
                                if (data.type === 'error') {
                                    log(`❌ エラーイベント: ${data.text}`, 'error');
                                    return;
                                }
                            } catch (e) {
                                log(`JSON Parse Error: ${e.message} - Line: ${line}`, 'error');
                            }
                        } else if (line.trim()) {
                            log(`Non-data line: ${line}`, 'debug');
                        }
                    }
                }
                
            } catch (error) {
                log(`Fetch Error: ${error.message}`, 'error');
                log(`Stack: ${error.stack}`, 'error');
            }
        }
        
        // ページ読み込み時にログ出力
        log('Debug tool ready', 'info');
    </script>
</body>
</html>
