<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>voice-app（仮）</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 12px 20px;
            background: #111;
            border-bottom: 1px solid #222;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        header h1 {
            font-size: 16px;
            font-weight: 600;
            color: #fff;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #888;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #444;
        }

        .status-dot.connected {
            background: #22c55e;
        }

        .status-dot.recording {
            background: #ef4444;
            animation: pulse 1s infinite;
        }

        .status-dot.processing {
            background: #f59e0b;
            animation: pulse 0.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid #444;
            border-top: 2px solid #f59e0b;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
        }

        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .message {
            padding: 10px 14px;
            border-radius: 8px;
            max-width: 85%;
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .message.user {
            background: #1a3a5c;
            align-self: flex-end;
            color: #c8e0f8;
        }

        .message.interim {
            background: #1a2a3c;
            align-self: flex-end;
            color: #7aa8d4;
            opacity: 0.7;
            font-style: italic;
        }

        .message.ai {
            background: #1a1a2e;
            align-self: flex-start;
            color: #b8b8e8;
        }

        .message.system {
            background: #1a2a1a;
            align-self: center;
            color: #88c888;
            font-size: 12px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .message.system.processing {
            background: #2a1e1a;
            color: #f59e0b;
        }

        .message.error {
            background: #2e1a1a;
            align-self: center;
            color: #e88888;
            font-size: 12px;
        }

        .message.file-change {
            background: #1a2e2a;
            align-self: flex-start;
            color: #88c8b8;
            font-size: 12px;
            font-family: monospace;
        }

        .message.commit {
            background: #2a2e1a;
            align-self: center;
            color: #c8c888;
            font-size: 12px;
            font-family: monospace;
        }

        #controls {
            padding: 16px 20px;
            background: #111;
            border-top: 1px solid #222;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
        }

        #mic-button {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            border: 2px solid #333;
            background: #1a1a1a;
            color: #888;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        #mic-button:hover {
            border-color: #555;
            color: #aaa;
        }

        #mic-button.active {
            border-color: #ef4444;
            background: #2a1010;
            color: #ef4444;
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.2);
        }

        #mic-button.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #silence-timer {
            font-size: 12px;
            color: #666;
            min-width: 80px;
            text-align: center;
        }
    </style>
</head>
<body>
    <header>
        <h1>voice-app（仮）</h1>
        <div class="status-indicator">
            <div class="status-dot" id="status-dot"></div>
            <span id="status-text">未接続</span>
        </div>
    </header>

    <div id="chat"></div>

    <div id="controls">
        <span id="silence-timer"></span>
        <button id="mic-button" title="音声入力">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                <line x1="12" y1="19" x2="12" y2="23"/>
                <line x1="8" y1="23" x2="16" y2="23"/>
            </svg>
        </button>
        <span id="silence-info" style="font-size: 11px; color: #555; min-width: 80px; text-align: center;">
            1秒の沈黙で送信
        </span>
    </div>

    <script>
        const chat = document.getElementById('chat');
        const micButton = document.getElementById('mic-button');
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');
        const silenceTimer = document.getElementById('silence-timer');

        let ws = null;
        let recognition = null;
        let isRecording = false;
        let isProcessing = false;
        let silenceTimeout = null;
        let interimElement = null;
        let finalTranscript = '';
        const SILENCE_DELAY = 1000; // 1秒の沈黙で送信

        function connectWebSocket() {
            const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${location.host}/api/voice/ws`);

            ws.onopen = () => {
                statusDot.className = 'status-dot connected';
                statusText.textContent = '接続済み';
            };

            ws.onclose = () => {
                statusDot.className = 'status-dot';
                statusText.textContent = '未接続';
                setTimeout(connectWebSocket, 3000);
            };

            ws.onmessage = (event) => {
                const msg = JSON.parse(event.data);
                handleServerMessage(msg);
            };
        }

        function handleServerMessage(msg) {
            switch (msg.type) {
                case 'transcript':
                    // サーバーからのエコーバックは無視（ローカルで表示済み）
                    break;
                case 'status':
                    isProcessing = true;
                    updateMicButtonState();
                    addProcessingMessage(msg.text);
                    statusDot.className = 'status-dot processing';
                    statusText.textContent = '処理中';
                    break;
                case 'ai_response':
                    addMessage(msg.text, 'ai');
                    break;
                case 'file_change':
                    addMessage(`${msg.action}: ${msg.path}`, 'file-change');
                    break;
                case 'commit':
                    addMessage(`committed: ${msg.message}`, 'commit');
                    break;
                case 'complete':
                    isProcessing = false;
                    updateMicButtonState();
                    statusDot.className = 'status-dot connected';
                    statusText.textContent = '接続済み';
                    addMessage('✅ 処理完了', 'system');
                    break;
                case 'error':
                    isProcessing = false;
                    updateMicButtonState();
                    addMessage(msg.text, 'error');
                    statusDot.className = 'status-dot connected';
                    statusText.textContent = '接続済み';
                    break;
            }
        }

        function addMessage(text, type) {
            const div = document.createElement('div');
            div.className = `message ${type}`;
            div.textContent = text;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
            return div;
        }

        function addProcessingMessage(text) {
            const div = document.createElement('div');
            div.className = 'message system processing';
            
            const spinner = document.createElement('span');
            spinner.className = 'spinner';
            
            const textSpan = document.createElement('span');
            textSpan.textContent = text;
            
            div.appendChild(spinner);
            div.appendChild(textSpan);
            
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
            return div;
        }

        function updateMicButtonState() {
            if (isProcessing) {
                micButton.classList.add('disabled');
                micButton.title = 'AI処理中...';
            } else {
                micButton.classList.remove('disabled');
                micButton.title = '音声入力';
            }
        }

        function setupSpeechRecognition() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                addMessage('このブラウザは音声認識に対応していません。Chrome を使用してください。', 'error');
                return;
            }

            recognition = new SpeechRecognition();
            recognition.lang = 'ja-JP';
            recognition.continuous = true;
            recognition.interimResults = true;

            recognition.onaudiostart = () => {
                addMessage('マイク入力開始', 'system');
            };

            recognition.onspeechstart = () => {
                addMessage('音声検出', 'system');
            };

            recognition.onresult = (event) => {
                let interim = '';
                let finalPart = '';

                for (let i = event.resultIndex; i < event.results.length; i++) {
                    const transcript = event.results[i][0].transcript;
                    if (event.results[i].isFinal) {
                        finalPart += transcript;
                    } else {
                        interim += transcript;
                    }
                }

                if (finalPart) {
                    finalTranscript += finalPart;
                }

                // リアルタイム表示を更新
                updateInterimDisplay(finalTranscript + interim);

                // 沈黙タイマーをリセット
                resetSilenceTimer();
            };

            recognition.onend = () => {
                if (isRecording && !isProcessing) {
                    // エラー後の再開はディレイを入れて高速リトライを防止
                    setTimeout(() => {
                        if (isRecording && !isProcessing) {
                            try {
                                recognition.start();
                            } catch (e) {
                                // already started等のエラーを無視
                            }
                        }
                    }, 300);
                }
            };

            recognition.onerror = (event) => {
                if (event.error === 'no-speech' || event.error === 'aborted') {
                    return;
                }
                addMessage(`音声認識エラー: ${event.error}`, 'error');
            };
        }

        function updateInterimDisplay(text) {
            if (!text) return;

            if (!interimElement) {
                interimElement = addMessage(text, 'interim');
            } else {
                interimElement.textContent = text;
                chat.scrollTop = chat.scrollHeight;
            }
        }

        function resetSilenceTimer() {
            if (silenceTimeout) {
                clearTimeout(silenceTimeout);
            }

            silenceTimer.textContent = '話し中...';

            silenceTimeout = setTimeout(() => {
                sendVoiceComplete();
            }, SILENCE_DELAY);
        }

        function sendVoiceComplete() {
            if (!finalTranscript.trim()) {
                silenceTimer.textContent = '';
                return;
            }

            // interim表示を確定メッセージに変換
            if (interimElement) {
                interimElement.className = 'message user';
                interimElement.textContent = finalTranscript;
                interimElement = null;
            }

            // WebSocketで送信
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    type: 'voice_complete',
                    text: finalTranscript,
                }));
            }

            finalTranscript = '';
            silenceTimer.textContent = '送信済み';
        }

        function startRecording() {
            if (isProcessing) {
                addMessage('AI処理中のため録音できません', 'error');
                return;
            }

            if (!recognition) {
                setupSpeechRecognition();
            }
            if (!recognition) return;

            isRecording = true;
            finalTranscript = '';
            interimElement = null;
            micButton.classList.add('active');
            statusDot.className = 'status-dot recording';
            statusText.textContent = '録音中';
            silenceTimer.textContent = '';
            addMessage('録音開始...', 'system');

            try {
                recognition.start();
            } catch (e) {
                addMessage(`録音開始エラー: ${e.message}`, 'error');
            }
        }

        function stopRecording() {
            isRecording = false;
            micButton.classList.remove('active');
            statusDot.className = 'status-dot connected';
            statusText.textContent = '接続済み';
            silenceTimer.textContent = '';

            if (silenceTimeout) {
                clearTimeout(silenceTimeout);
                silenceTimeout = null;
            }

            if (recognition) {
                recognition.stop();
            }
        }

        micButton.addEventListener('click', () => {
            if (isProcessing) {
                return; // 処理中はクリックを無効化
            }

            if (isRecording) {
                // 手動停止 → 即座に送信
                if (finalTranscript.trim()) {
                    sendVoiceComplete();
                } else {
                    stopRecording();
                }
            } else {
                startRecording();
            }
        });

        // 初期化
        connectWebSocket();
        setupSpeechRecognition();
    </script>
</body>
</html>
