<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>voice-app</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 12px 20px;
            background: #111;
            border-bottom: 1px solid #222;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        header h1 {
            font-size: 16px;
            font-weight: 600;
            color: #fff;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .git-status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: #666;
            cursor: pointer;
        }

        .git-status:hover { color: #aaa; }

        .git-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #444;
        }

        .git-dot.ok { background: #22c55e; }
        .git-dot.warn { background: #f59e0b; }
        .git-dot.error { background: #ef4444; }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #888;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #444;
        }

        .status-dot.connected { background: #22c55e; }
        .status-dot.recording { background: #ef4444; animation: pulse 1s infinite; }
        .status-dot.processing { background: #f59e0b; animation: pulse 0.5s infinite; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid #444;
            border-top: 2px solid #f59e0b;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
        }

        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .message {
            padding: 10px 14px;
            border-radius: 8px;
            max-width: 85%;
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .message.user { background: #1a3a5c; align-self: flex-end; color: #c8e0f8; }
        .message.interim { background: #1a2a3c; align-self: flex-end; color: #7aa8d4; opacity: 0.7; font-style: italic; }
        .message.ai { background: #1a1a2e; align-self: flex-start; color: #b8b8e8; }
        .message.system { background: #1a2a1a; align-self: center; color: #88c888; font-size: 12px; text-align: center; display: flex; align-items: center; justify-content: center; }
        .message.system.processing { background: #2a1e1a; color: #f59e0b; }
        .message.error { background: #2e1a1a; align-self: center; color: #e88888; font-size: 12px; }
        .message.file-change { background: #1a2e2a; align-self: flex-start; color: #88c8b8; font-size: 12px; font-family: monospace; }
        .message.commit { background: #2a2e1a; align-self: center; color: #c8c888; font-size: 12px; font-family: monospace; }

        #controls {
            padding: 16px 20px;
            background: #111;
            border-top: 1px solid #222;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .input-section {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 12px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 24px;
            padding: 8px 16px;
        }

        #text-input {
            flex: 1;
            background: none;
            border: none;
            color: #e0e0e0;
            font-size: 14px;
            outline: none;
            padding: 6px 0;
        }

        #text-input::placeholder {
            color: #666;
        }

        .send-button {
            background: #1a3a5c;
            border: none;
            color: #c8e0f8;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .send-button:hover {
            background: #2a4a6c;
        }

        .send-button:disabled {
            background: #333;
            color: #666;
            cursor: not-allowed;
        }

        .voice-section {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #mic-button {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 2px solid #333;
            background: #1a1a1a;
            color: #888;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        #mic-button:hover { border-color: #555; color: #aaa; }
        #mic-button.active { border-color: #ef4444; background: #2a1010; color: #ef4444; box-shadow: 0 0 20px rgba(239, 68, 68, 0.2); }

        #silence-timer { font-size: 11px; color: #666; min-width: 60px; text-align: center; }

        .silence-info {
            font-size: 10px;
            color: #555;
            text-align: center;
        }
    </style>
</head>
<body>
    <header>
        <h1>voice-app</h1>
        <div class="header-right">
            <div class="git-status" id="git-status" title="クリックでGit状態を再チェック">
                <div class="git-dot" id="git-dot"></div>
                <span id="git-text">Git: 確認中</span>
            </div>
            <div class="status-indicator">
                <div class="status-dot" id="status-dot"></div>
                <span id="status-text">準備中</span>
            </div>
        </div>
    </header>

    <div id="chat"></div>

    <div id="controls">
        <div class="input-section">
            <input type="text" id="text-input" placeholder="テキストで入力..." />
            <button class="send-button" id="send-button" title="送信">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="22" y1="2" x2="11" y2="13"/>
                    <polygon points="22,2 15,22 11,13 2,9"/>
                </svg>
            </button>
        </div>
        
        <div class="voice-section">
            <div style="display: flex; flex-direction: column; align-items: center; gap: 2px;">
                <span id="silence-timer"></span>
                <button id="mic-button" title="音声入力">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                        <line x1="12" y1="19" x2="12" y2="23"/>
                        <line x1="8" y1="23" x2="16" y2="23"/>
                    </svg>
                </button>
                <span class="silence-info">1秒の沈黙で送信</span>
            </div>
        </div>
    </div>

    <script>
        const chat = document.getElementById('chat');
        const micButton = document.getElementById('mic-button');
        const textInput = document.getElementById('text-input');
        const sendButton = document.getElementById('send-button');
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');
        const silenceTimer = document.getElementById('silence-timer');
        const gitDot = document.getElementById('git-dot');
        const gitText = document.getElementById('git-text');
        const gitStatusEl = document.getElementById('git-status');

        let recognition = null;
        let isRecording = false;
        let silenceTimeout = null;
        let interimElement = null;
        let finalTranscript = '';
        let processingElements = [];
        let isWaitingForAI = false;
        let currentAiElement = null;
        const SILENCE_DELAY = 1000;

        function initializeApp() {
            statusDot.className = 'status-dot connected';
            statusText.textContent = '準備完了';
            checkGitStatus(false);
            // アプリ初期化後に自動で音声入力を開始
            setTimeout(() => {
                startRecording();
            }, 500);
        }

        function handleServerMessage(msg) {
            switch (msg.type) {
                case 'status':
                    updateProcessingMessage(msg.text);
                    isWaitingForAI = true;
                    statusDot.className = 'status-dot processing';
                    statusText.textContent = 'AI処理中';
                    break;
                case 'ai_chunk':
                    clearAllProcessingMessages();
                    appendToAiMessage(msg.text);
                    break;
                case 'ai_done':
                    finalizeAiMessage();
                    break;
                case 'file_change':
                    addMessage(`${msg.action}: ${msg.path}`, 'file-change');
                    break;
                case 'commit':
                    addMessage(`committed: ${msg.message}`, 'commit');
                    break;
                case 'complete':
                    isWaitingForAI = false;
                    clearAllProcessingMessages();
                    updateStatusAfterAI();
                    break;
                case 'error':
                    isWaitingForAI = false;
                    clearAllProcessingMessages();
                    addMessage(msg.text, 'error');
                    updateStatusAfterAI();
                    break;
            }
        }

        function updateStatusAfterAI() {
            if (isRecording) {
                statusDot.className = 'status-dot recording';
                statusText.textContent = '録音中';
            } else {
                statusDot.className = 'status-dot connected';
                statusText.textContent = '準備完了';
            }
        }

        function addMessage(text, type) {
            const div = document.createElement('div');
            div.className = `message ${type}`;
            div.textContent = text;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
            return div;
        }

        function addProcessingMessage(text) {
            const div = document.createElement('div');
            div.className = 'message system processing';
            const spinner = document.createElement('span');
            spinner.className = 'spinner';
            const textSpan = document.createElement('span');
            textSpan.textContent = text;
            div.appendChild(spinner);
            div.appendChild(textSpan);
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
            
            processingElements.push(div);
            return div;
        }

        function updateProcessingMessage(newText) {
            if (processingElements.length > 0) {
                const lastElement = processingElements[processingElements.length - 1];
                const textSpan = lastElement.querySelector('span:last-child');
                if (textSpan) {
                    textSpan.textContent = newText;
                    chat.scrollTop = chat.scrollHeight;
                }
            } else {
                addProcessingMessage(newText);
            }
        }

        function clearAllProcessingMessages() {
            processingElements.forEach(element => {
                if (element && element.parentNode) {
                    element.remove();
                }
            });
            processingElements = [];
        }

        function appendToAiMessage(chunk) {
            if (!currentAiElement) {
                currentAiElement = document.createElement('div');
                currentAiElement.className = 'message ai';
                currentAiElement.textContent = '';
                chat.appendChild(currentAiElement);
            }
            currentAiElement.textContent += chunk;
            chat.scrollTop = chat.scrollHeight;
        }

        function finalizeAiMessage() {
            currentAiElement = null;
        }

        const GIT_KEYWORDS = ['git確認', 'git チェック', 'ghコマンド', 'gh コマンド', 'gitステータス', 'git ステータス', 'git状態', 'git 状態'];

        function checkGitStatus(showInChat) {
            return fetch('/api/git/check')
                .then(r => r.json())
                .then(data => {
                    const gh = data.gh_status;
                    const repo = data.repo_info;

                    if (gh.gh_installed && gh.gh_authenticated && gh.git_repo) {
                        gitDot.className = 'git-dot ok';
                        const branch = repo ? repo.current_branch : '?';
                        gitText.textContent = `Git: ${branch}`;
                    } else if (gh.gh_installed) {
                        gitDot.className = 'git-dot warn';
                        gitText.textContent = 'Git: 一部エラー';
                    } else {
                        gitDot.className = 'git-dot error';
                        gitText.textContent = 'Git: 未設定';
                    }

                    if (showInChat) {
                        const lines = [];
                        lines.push(`gh installed: ${gh.gh_installed ? 'OK' : 'NG'}`);
                        lines.push(`gh authenticated: ${gh.gh_authenticated ? 'OK' : 'NG'}`);
                        lines.push(`git repo: ${gh.git_repo ? 'OK' : 'NG'}`);
                        if (gh.errors.length > 0) {
                            lines.push(`errors: ${gh.errors.join(', ')}`);
                        }
                        if (repo) {
                            lines.push(`remote: ${repo.remote_url}`);
                            lines.push(`branch: ${repo.current_branch}`);
                        }
                        addMessage(lines.join('\n'), 'system');
                    }
                })
                .catch(() => {
                    gitDot.className = 'git-dot error';
                    gitText.textContent = 'Git: 接続エラー';
                    if (showInChat) {
                        addMessage('Git状態の取得に失敗しました', 'error');
                    }
                });
        }

        function isGitCheckCommand(text) {
            const normalized = text.trim().toLowerCase();
            return GIT_KEYWORDS.some(kw => normalized.includes(kw));
        }

        function sendMessage(text, skipUserDisplay) {
            if (!text.trim() || isWaitingForAI) return;

            if (!skipUserDisplay) {
                addMessage(text, 'user');
            }

            // gitチェックコマンドの場合はAPIを直接呼ぶ
            if (isGitCheckCommand(text)) {
                checkGitStatus(true);
                return;
            }

            // SSEで送信
            addProcessingMessage('送信中...');
            isWaitingForAI = true;
            statusDot.className = 'status-dot processing';
            statusText.textContent = 'AI処理中';
            
            // fetch + ReadableStream でSSEを受信
            fetch('/api/voice/stream', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Accept': 'text/event-stream'
                },
                body: JSON.stringify({ text: text })
            }).then(response => {
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                
                function readStream() {
                    return reader.read().then(({ done, value }) => {
                        if (done) return;
                        
                        const chunk = decoder.decode(value);
                        const lines = chunk.split('\n');
                        
                        for (const line of lines) {
                            if (line.startsWith('data: ')) {
                                try {
                                    const data = JSON.parse(line.slice(6));
                                    handleServerMessage(data);
                                } catch (e) {
                                    console.error('JSON parse error:', e);
                                }
                            }
                        }
                        
                        return readStream();
                    });
                }
                
                return readStream();
            }).catch(error => {
                isWaitingForAI = false;
                clearAllProcessingMessages();
                addMessage(`エラー: ${error.message}`, 'error');
                updateStatusAfterAI();
            });
        }

        function setupSpeechRecognition() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                addMessage('このブラウザは音声認識に対応していません。Chrome を使用してください。', 'error');
                return;
            }

            recognition = new SpeechRecognition();
            recognition.lang = 'ja-JP';
            recognition.continuous = true;
            recognition.interimResults = true;

            recognition.onresult = (event) => {
                let interim = '';
                let finalPart = '';

                for (let i = event.resultIndex; i < event.results.length; i++) {
                    const transcript = event.results[i][0].transcript;
                    if (event.results[i].isFinal) {
                        finalPart += transcript;
                    } else {
                        interim += transcript;
                    }
                }

                if (finalPart) {
                    finalTranscript += finalPart;
                }

                updateInterimDisplay(finalTranscript + interim);
                resetSilenceTimer();
            };

            recognition.onend = () => {
                if (isRecording) {
                    setTimeout(() => {
                        if (isRecording) {
                            try { recognition.start(); } catch (e) {}
                        }
                    }, 300);
                }
            };

            recognition.onerror = (event) => {
                if (event.error === 'no-speech' || event.error === 'aborted' || event.error === 'network') {
                    return;
                }
                addMessage(`音声認識エラー: ${event.error}`, 'error');
            };
        }

        function updateInterimDisplay(text) {
            if (!text) return;

            if (!interimElement) {
                interimElement = addMessage(text, 'interim');
            } else {
                interimElement.textContent = text;
                chat.scrollTop = chat.scrollHeight;
            }
        }

        function resetSilenceTimer() {
            if (silenceTimeout) {
                clearTimeout(silenceTimeout);
            }

            silenceTimer.textContent = '話し中...';

            silenceTimeout = setTimeout(() => {
                sendVoiceComplete();
            }, SILENCE_DELAY);
        }

        function sendVoiceComplete() {
            if (!finalTranscript.trim()) {
                silenceTimer.textContent = '';
                return;
            }

            if (interimElement) {
                interimElement.className = 'message user';
                interimElement.textContent = finalTranscript;
                interimElement = null;
            }

            sendMessage(finalTranscript, true);
            finalTranscript = '';
            silenceTimer.textContent = '送信済み';
        }

        function startRecording() {
            if (!recognition) {
                setupSpeechRecognition();
            }
            if (!recognition) return;

            isRecording = true;
            finalTranscript = '';
            interimElement = null;
            micButton.classList.add('active');
            
            if (!isWaitingForAI) {
                statusDot.className = 'status-dot recording';
                statusText.textContent = '録音中';
            }
            silenceTimer.textContent = '';

            try { recognition.start(); } catch (e) {}
        }

        function stopRecording() {
            isRecording = false;
            micButton.classList.remove('active');
            
            if (!isWaitingForAI) {
                statusDot.className = 'status-dot connected';
                statusText.textContent = '準備完了';
            }
            silenceTimer.textContent = '';

            if (silenceTimeout) {
                clearTimeout(silenceTimeout);
                silenceTimeout = null;
            }

            if (recognition) {
                recognition.stop();
            }
        }

        // イベントリスナー
        micButton.addEventListener('click', () => {
            if (isRecording) {
                if (finalTranscript.trim()) {
                    sendVoiceComplete();
                }
                stopRecording();
            } else {
                startRecording();
            }
        });

        sendButton.addEventListener('click', () => {
            const text = textInput.value.trim();
            if (text) {
                sendMessage(text);
                textInput.value = '';
            }
        });

        textInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                const text = textInput.value.trim();
                if (text) {
                    sendMessage(text);
                    textInput.value = '';
                }
            }
        });

        gitStatusEl.addEventListener('click', () => {
            checkGitStatus(true);
        });

        // 初期化
        initializeApp();
        setupSpeechRecognition();
    </script>
</body>
</html>
