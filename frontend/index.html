<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>voice-app</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 12px 20px;
            background: #111;
            border-bottom: 1px solid #222;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        header h1 {
            font-size: 16px;
            font-weight: 600;
            color: #fff;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #888;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #444;
        }

        .status-dot.connected { background: #22c55e; }
        .status-dot.recording { background: #ef4444; animation: pulse 1s infinite; }
        .status-dot.processing { background: #f59e0b; animation: pulse 0.5s infinite; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid #444;
            border-top: 2px solid #f59e0b;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
        }

        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .message {
            padding: 10px 14px;
            border-radius: 8px;
            max-width: 85%;
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .message.user { background: #1a3a5c; align-self: flex-end; color: #c8e0f8; }
        .message.interim { background: #1a2a3c; align-self: flex-end; color: #7aa8d4; opacity: 0.7; font-style: italic; }
        .message.ai { background: #1a1a2e; align-self: flex-start; color: #b8b8e8; }
        .message.system { background: #1a2a1a; align-self: center; color: #88c888; font-size: 12px; text-align: center; display: flex; align-items: center; justify-content: center; }
        .message.system.processing { background: #2a1e1a; color: #f59e0b; }
        .message.error { background: #2e1a1a; align-self: center; color: #e88888; font-size: 12px; }
        .message.file-change { background: #1a2e2a; align-self: flex-start; color: #88c8b8; font-size: 12px; font-family: monospace; }
        .message.commit { background: #2a2e1a; align-self: center; color: #c8c888; font-size: 12px; font-family: monospace; }

        #controls {
            padding: 16px 20px;
            background: #111;
            border-top: 1px solid #222;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .input-section {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 12px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 24px;
            padding: 8px 16px;
        }

        #text-input {
            flex: 1;
            background: none;
            border: none;
            color: #e0e0e0;
            font-size: 14px;
            outline: none;
            padding: 6px 0;
        }

        #text-input::placeholder {
            color: #666;
        }

        .send-button {
            background: #1a3a5c;
            border: none;
            color: #c8e0f8;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .send-button:hover {
            background: #2a4a6c;
        }

        .send-button:disabled {
            background: #333;
            color: #666;
            cursor: not-allowed;
        }

        .voice-section {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #mic-button {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 2px solid #333;
            background: #1a1a1a;
            color: #888;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        #mic-button:hover { border-color: #555; color: #aaa; }
        #mic-button.active { border-color: #ef4444; background: #2a1010; color: #ef4444; box-shadow: 0 0 20px rgba(239, 68, 68, 0.2); }

        #silence-timer { font-size: 11px; color: #666; min-width: 60px; text-align: center; }

        .silence-info {
            font-size: 10px;
            color: #555;
            text-align: center;
        }
    </style>
</head>
<body>
    <header>
        <h1>voice-app</h1>
        <div class="status-indicator">
            <div class="status-dot" id="status-dot"></div>
            <span id="status-text">未接続</span>
        </div>
    </header>

    <div id="chat"></div>

    <div id="controls">
        <div class="input-section">
            <input type="text" id="text-input" placeholder="テキストで入力..." />
            <button class="send-button" id="send-button" title="送信">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="22" y1="2" x2="11" y2="13"/>
                    <polygon points="22,2 15,22 11,13 2,9"/>
                </svg>
            </button>
        </div>
        
        <div class="voice-section">
            <div style="display: flex; flex-direction: column; align-items: center; gap: 2px;">
                <span id="silence-timer"></span>
                <button id="mic-button" title="音声入力">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                        <line x1="12" y1="19" x2="12" y2="23"/>
                        <line x1="8" y1="23" x2="16" y2="23"/>
                    </svg>
                </button>
                <span class="silence-info">1秒の沈黙で送信</span>
            </div>
        </div>
    </div>

    <script>
        const chat = document.getElementById('chat');
        const micButton = document.getElementById('mic-button');
        const textInput = document.getElementById('text-input');
        const sendButton = document.getElementById('send-button');
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');
        const silenceTimer = document.getElementById('silence-timer');

        let ws = null;
        let recognition = null;
        let isRecording = false;
        let silenceTimeout = null;
        let interimElement = null;
        let finalTranscript = '';
        let processingElements = [];
        let isWaitingForAI = false;
        const SILENCE_DELAY = 1000;

        function connectWebSocket() {
            const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${location.host}/api/voice/ws`);

            ws.onopen = () => {
                statusDot.className = 'status-dot connected';
                statusText.textContent = '接続済み';
                // WebSocket接続完了後に自動で音声入力を開始
                setTimeout(() => {
                    startRecording();
                }, 500);
            };

            ws.onclose = () => {
                statusDot.className = 'status-dot';
                statusText.textContent = '未接続';
                setTimeout(connectWebSocket, 3000);
            };

            ws.onmessage = (event) => {
                const msg = JSON.parse(event.data);
                handleServerMessage(msg);
            };
        }

        function handleServerMessage(msg) {
            switch (msg.type) {
                case 'transcript':
                    break;
                case 'status':
                    // サーバー側のステータスメッセージでローディングメッセージを更新
                    updateProcessingMessage(msg.text);
                    isWaitingForAI = true;
                    statusDot.className = 'status-dot processing';
                    statusText.textContent = 'AI処理中';
                    break;
                case 'ai_response':
                    // AI回答を受信 → AI待機状態を解除してからメッセージを表示
                    isWaitingForAI = false;
                    clearAllProcessingMessages();
                    addMessage(msg.text, 'ai');
                    updateStatusAfterAI();
                    break;
                case 'file_change':
                    addMessage(`${msg.action}: ${msg.path}`, 'file-change');
                    break;
                case 'commit':
                    addMessage(`committed: ${msg.message}`, 'commit');
                    break;
                case 'complete':
                    // 処理完了時にAI待機状態をリセット
                    isWaitingForAI = false;
                    clearAllProcessingMessages();
                    updateStatusAfterAI();
                    break;
                case 'error':
                    isWaitingForAI = false;
                    clearAllProcessingMessages();
                    addMessage(msg.text, 'error');
                    updateStatusAfterAI();
                    break;
            }
        }

        function updateStatusAfterAI() {
            if (isRecording) {
                statusDot.className = 'status-dot recording';
                statusText.textContent = '録音中';
            } else {
                statusDot.className = 'status-dot connected';
                statusText.textContent = '接続済み';
            }
        }

        function addMessage(text, type) {
            const div = document.createElement('div');
            div.className = `message ${type}`;
            div.textContent = text;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
            return div;
        }

        function addProcessingMessage(text) {
            const div = document.createElement('div');
            div.className = 'message system processing';
            const spinner = document.createElement('span');
            spinner.className = 'spinner';
            const textSpan = document.createElement('span');
            textSpan.textContent = text;
            div.appendChild(spinner);
            div.appendChild(textSpan);
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
            
            // 処理メッセージを配列で管理
            processingElements.push(div);
            return div;
        }

        function updateProcessingMessage(newText) {
            // 既存の処理メッセージがあれば更新、なければ新規作成
            if (processingElements.length > 0) {
                const lastElement = processingElements[processingElements.length - 1];
                const textSpan = lastElement.querySelector('span:last-child');
                if (textSpan) {
                    textSpan.textContent = newText;
                    chat.scrollTop = chat.scrollHeight;
                }
            } else {
                addProcessingMessage(newText);
            }
        }

        function clearAllProcessingMessages() {
            // 全ての処理メッセージを削除
            processingElements.forEach(element => {
                if (element && element.parentNode) {
                    element.remove();
                }
            });
            processingElements = [];
        }

        function sendMessage(text) {
            if (!text.trim() || isWaitingForAI) return;

            // ユーザーメッセージを表示
            addMessage(text, 'user');

            if (ws && ws.readyState === WebSocket.OPEN) {
                // メッセージ送信直後にローディング表示を開始
                addProcessingMessage('送信中...');
                isWaitingForAI = true;
                statusDot.className = 'status-dot processing';
                statusText.textContent = 'AI処理中';
                
                ws.send(JSON.stringify({
                    type: 'voice_complete',
                    text: text,
                }));
            }
        }

        function setupSpeechRecognition() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                addMessage('このブラウザは音声認識に対応していません。Chrome を使用してください。', 'error');
                return;
            }

            recognition = new SpeechRecognition();
            recognition.lang = 'ja-JP';
            recognition.continuous = true;
            recognition.interimResults = true;

            recognition.onresult = (event) => {
                let interim = '';
                let finalPart = '';

                for (let i = event.resultIndex; i < event.results.length; i++) {
                    const transcript = event.results[i][0].transcript;
                    if (event.results[i].isFinal) {
                        finalPart += transcript;
                    } else {
                        interim += transcript;
                    }
                }

                if (finalPart) {
                    finalTranscript += finalPart;
                }

                updateInterimDisplay(finalTranscript + interim);
                resetSilenceTimer();
            };

            recognition.onend = () => {
                if (isRecording) {
                    setTimeout(() => {
                        if (isRecording) {
                            try { recognition.start(); } catch (e) {}
                        }
                    }, 300);
                }
            };

            recognition.onerror = (event) => {
                if (event.error === 'no-speech' || event.error === 'aborted' || event.error === 'network') {
                    return;
                }
                addMessage(`音声認識エラー: ${event.error}`, 'error');
            };
        }

        function updateInterimDisplay(text) {
            if (!text) return;

            if (!interimElement) {
                interimElement = addMessage(text, 'interim');
            } else {
                interimElement.textContent = text;
                chat.scrollTop = chat.scrollHeight;
            }
        }

        function resetSilenceTimer() {
            if (silenceTimeout) {
                clearTimeout(silenceTimeout);
            }

            silenceTimer.textContent = '話し中...';

            silenceTimeout = setTimeout(() => {
                sendVoiceComplete();
            }, SILENCE_DELAY);
        }

        function sendVoiceComplete() {
            if (!finalTranscript.trim()) {
                silenceTimer.textContent = '';
                return;
            }

            if (interimElement) {
                interimElement.className = 'message user';
                interimElement.textContent = finalTranscript;
                interimElement = null;
            }

            if (ws && ws.readyState === WebSocket.OPEN) {
                // 音声送信直後にローディング表示を開始
                addProcessingMessage('送信中...');
                isWaitingForAI = true;
                statusDot.className = 'status-dot processing';
                statusText.textContent = 'AI処理中';
                
                ws.send(JSON.stringify({
                    type: 'voice_complete',
                    text: finalTranscript,
                }));
            }

            finalTranscript = '';
            silenceTimer.textContent = '送信済み';
            // マイクは切らない（常時ON）
        }

        function startRecording() {
            if (!recognition) {
                setupSpeechRecognition();
            }
            if (!recognition) return;

            isRecording = true;
            finalTranscript = '';
            interimElement = null;
            micButton.classList.add('active');
            
            // AI待機中でなければ録音状態を表示
            if (!isWaitingForAI) {
                statusDot.className = 'status-dot recording';
                statusText.textContent = '録音中';
            }
            silenceTimer.textContent = '';

            try { recognition.start(); } catch (e) {}
        }

        function stopRecording() {
            isRecording = false;
            micButton.classList.remove('active');
            
            // AI待機中でなければ接続状態を表示
            if (!isWaitingForAI) {
                statusDot.className = 'status-dot connected';
                statusText.textContent = '接続済み';
            }
            silenceTimer.textContent = '';

            if (silenceTimeout) {
                clearTimeout(silenceTimeout);
                silenceTimeout = null;
            }

            if (recognition) {
                recognition.stop();
            }
        }

        // イベントリスナー
        micButton.addEventListener('click', () => {
            if (isRecording) {
                if (finalTranscript.trim()) {
                    sendVoiceComplete();
                }
                stopRecording();
            } else {
                startRecording();
            }
        });

        sendButton.addEventListener('click', () => {
            const text = textInput.value.trim();
            if (text) {
                sendMessage(text);
                textInput.value = '';
            }
        });

        textInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                const text = textInput.value.trim();
                if (text) {
                    sendMessage(text);
                    textInput.value = '';
                }
            }
        });

        // AI処理中は送信ボタンを無効化
        function updateSendButtonState() {
            sendButton.disabled = isWaitingForAI;
        }

        // 初期化
        connectWebSocket();
        setupSpeechRecognition();
        
        // AI状態変化に応じて送信ボタンの状態を更新
        setInterval(updateSendButtonState, 100);
    </script>
</body>
</html>
